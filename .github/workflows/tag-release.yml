name: tag-release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version without leading v, for example 0.2.0"
        required: true
        type: string
      latest:
        description: "Mark the GitHub release as latest"
        required: true
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Validate version
        env:
          VERSION: ${{ inputs.version }}
        run: |
          echo "$VERSION" | grep -E '^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$'
      - name: Create tag if needed
        env:
          VERSION: ${{ inputs.version }}
        run: |
          TAG="v$VERSION"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists"
          else
            git tag "$TAG"
            git push origin "$TAG"
          fi
      - name: Create GitHub release with generated notes
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
          LATEST: ${{ inputs.latest }}
        run: |
          TAG="v$VERSION"
          LATEST_FLAG=""
          if [ "$LATEST" = "false" ]; then
            LATEST_FLAG="--latest=false"
          fi
          gh release view "$TAG" >/dev/null 2>&1 || gh release create "$TAG" --generate-notes $LATEST_FLAG --title "$TAG"
